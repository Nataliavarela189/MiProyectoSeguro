<h2>Login</h2>
<form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
  <div>
    <label>Usuario</label>
    <input formControlName="username" />
  </div>

  <div>
    <label>Contraseña</label>
    <input type="password" formControlName="password" />
  </div>

  <button type="submit">Iniciar Sesión</button>
</form>
